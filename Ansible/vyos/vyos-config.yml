---
- name: vyos network config
  hosts: vyos
  gather_facts: false
  vars_prompt:
    - name: password
      prompt: "Enter New Password"
      private: true

  tasks:
    - name: Hash the password
      set_fact:
          password_hash: "{{password | password_hash('sha512') }}"

    - name: Deploy config.boot from template
      template:
        src: config.boot.j2
        dest: /config/config.boot
    
    - name: Reboot the system
      shell: nohup bash -c "sleep 2 && reboot -" &
      async: 0
      poll: 0
      ignore_errors: true