---
- name: Post Provision Rocky Linux VMs
  hosts: all
  gather_facts: false

  tasks:
    - name: Add deployer public key
      ansible.builtin.authorized_key:
        user: deployer
        state: present
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

    - name: Create sudoers drop-in for deployer
      ansible.builtin.copy:
        dest: /etc/sudoers.d/deployer
        content: "deployer ALL=(ALL) NOPASSWD: ALL\n"
        mode: '0440'
        validate: /usr/sbin/visudo -cf %s

    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ new_hostname }}"

    - name: Apply static IP and restart networking in background
      ansible.builtin.shell: |
        nmcli con mod ens34 ipv4.method manual ipv4.addresses {{ static_ip }}/{{ subnet_prefix }} ipv4.gateway {{ gateway }} ipv4.dns {{ dns_server }}
        sleep 2 && nmcli con up ens34
      async: 45
      poll: 0